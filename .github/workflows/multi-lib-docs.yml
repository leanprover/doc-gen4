name: Multi-library docs regression test

on:
  push:
    branches:
      - "main"
  pull_request:

jobs:
  test-multi-lib:
    name: Test multi-library doc generation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install elan and build doc-gen4
        uses: leanprover/lean-action@v1
        with:
          build-args: "--wfail"

      - name: Create test project with three libraries
        run: |
          mkdir -p test-project
          cp lean-toolchain test-project/

          cat > test-project/lakefile.lean << 'EOF'
          import Lake
          open Lake DSL

          package test

          require «doc-gen4» from ".."

          lean_lib LibA
          lean_lib LibB
          lean_lib LibC
          EOF

          cat > test-project/LibA.lean << 'EOF'
          /-- A greeting from LibA -/
          def libAGreeting := "hello from A"
          EOF

          cat > test-project/LibB.lean << 'EOF'
          /-- A greeting from LibB -/
          def libBGreeting := "hello from B"
          EOF

          cat > test-project/LibC.lean << 'EOF'
          /-- A greeting from LibC -/
          def libCGreeting := "hello from C"
          EOF

      - name: Build docs for LibA and LibB
        run: |
          cd test-project
          export LEAN_ABORT_ON_PANIC=1
          lake build LibA:docs LibB:docs

      - name: Verify HTML for LibA and LibB
        run: |
          cd test-project
          fail=0
          for mod in LibA LibB; do
            if [ ! -f ".lake/build/doc/$mod.html" ]; then
              echo "FAIL: $mod.html was not generated"
              fail=1
            else
              echo "OK: $mod.html exists"
            fi
          done
          if [ "$fail" -eq 1 ]; then
            echo "Listing .lake/build/doc/:"
            find .lake/build/doc -name '*.html' | sort
            exit 1
          fi

      - name: Build docs for LibC incrementally
        run: |
          cd test-project
          export LEAN_ABORT_ON_PANIC=1
          lake build LibC:docs

      - name: Verify HTML for all three libraries
        run: |
          cd test-project
          fail=0
          for mod in LibA LibB LibC; do
            if [ ! -f ".lake/build/doc/$mod.html" ]; then
              echo "FAIL: $mod.html was not generated (or was removed)"
              fail=1
            else
              echo "OK: $mod.html exists"
            fi
          done
          if [ "$fail" -eq 1 ]; then
            echo "Listing .lake/build/doc/:"
            find .lake/build/doc -name '*.html' | sort
            exit 1
          fi
          echo "SUCCESS: All three libraries have HTML documentation"
